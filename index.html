<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#17123a">
<title>ポケット収録</title>
<style>
  :root {
    --bg: #17123a;
    --bg2: #221a52;
    --card: #2b2264;
    --card-hi: #372c7c;
    --accent: #8d67f0;
    --accent-hi: #a684ff;
    --rec: #ff4d6d;
    --text: #f3f0ff;
    --text-dim: #a89fd8;
    --ok: #4dd599;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    overscroll-behavior-y: none;
  }
  main { width: 100%; max-width: 520px; padding: 16px 16px 140px; }

  header { text-align: center; padding: 14px 0 4px; }
  header h1 { font-size: 20px; letter-spacing: .08em; }
  header h1 .mic { margin-right: 6px; }
  .notice {
    margin-top: 8px; font-size: 11.5px; color: var(--text-dim);
    background: rgba(255,255,255,.06); border-radius: 999px;
    display: inline-block; padding: 5px 14px;
  }

  /* ---- 収録エリア ---- */
  .recorder {
    margin-top: 18px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 16px 20px;
    text-align: center;
    box-shadow: 0 8px 28px rgba(0,0,0,.25);
  }
  .timer {
    font-variant-numeric: tabular-nums;
    font-size: 40px; font-weight: 700; letter-spacing: .04em;
    margin-bottom: 4px;
  }
  .rec-state { font-size: 12.5px; color: var(--text-dim); height: 18px; margin-bottom: 14px; }
  .rec-state.live { color: var(--rec); font-weight: 700; }
  .rec-state.live::before { content: "●"; margin-right: 5px; animation: blink 1.1s infinite; }
  .rec-state.paused { color: #ffb84d; font-weight: 700; }
  @keyframes blink { 50% { opacity: .25; } }

  .rec-controls { display: flex; align-items: center; justify-content: center; gap: 26px; }
  .rec-btn {
    width: 84px; height: 84px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,.85);
    background: var(--rec);
    cursor: pointer; position: relative;
    transition: transform .12s, border-radius .18s, background .18s;
    box-shadow: 0 0 0 0 rgba(255,77,109,.45);
  }
  .rec-btn:active { transform: scale(.93); }
  .rec-btn.recording {
    animation: pulse 1.6s infinite;
  }
  .rec-btn.recording::after {
    content: ""; position: absolute; inset: 26px;
    background: #fff; border-radius: 6px; /* 停止の四角 */
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,77,109,.45); }
    70% { box-shadow: 0 0 0 22px rgba(255,77,109,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,77,109,0); }
  }
  .side-btn {
    width: 58px; height: 58px; border-radius: 50%;
    border: none; background: var(--card-hi); color: var(--text);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s, transform .12s;
  }
  .side-btn:active { transform: scale(.92); }
  .side-btn[disabled] { opacity: .25; pointer-events: none; }
  .rec-hint { margin-top: 14px; font-size: 12px; color: var(--text-dim); }

  /* ---- チャンクリスト ---- */
  .chunks { margin-top: 22px; }
  .chunks-head { display: flex; align-items: baseline; justify-content: space-between; padding: 0 4px 10px; }
  .chunks-head h2 { font-size: 15px; letter-spacing: .06em; }
  .total-dur { font-size: 12.5px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  #chunkList { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .chunk {
    display: flex; align-items: center; gap: 10px;
    background: var(--card);
    border-radius: 14px;
    padding: 12px 12px 12px 6px;
    user-select: none; -webkit-user-select: none;
    position: relative;
    transition: box-shadow .15s;
  }
  .chunk.dragging {
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    background: var(--card-hi);
    z-index: 10;
    opacity: .95;
  }
  .chunk.playing { outline: 2px solid var(--accent); }
  .drag-handle {
    touch-action: none;
    width: 34px; align-self: stretch;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 18px;
    cursor: grab; flex-shrink: 0;
  }
  .chunk-icon {
    width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 19px;
  }
  .chunk-icon.talk { background: rgba(141,103,240,.22); }
  .chunk-icon.bgm  { background: rgba(77,213,153,.18); }
  .chunk-info { flex: 1; min-width: 0; }
  .chunk-name {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chunk-meta { font-size: 11.5px; color: var(--text-dim); margin-top: 3px; font-variant-numeric: tabular-nums; }
  .chunk-btn {
    width: 42px; height: 42px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.08); color: var(--text);
    font-size: 16px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .chunk-btn:active { transform: scale(.9); }
  .chunk-btn.del { color: #ff8a9d; }

  .empty {
    text-align: center; color: var(--text-dim); font-size: 13px;
    padding: 26px 10px; background: rgba(255,255,255,.04);
    border: 1.5px dashed rgba(255,255,255,.15); border-radius: 14px;
  }

  .bgm-add {
    margin-top: 12px; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: rgba(77,213,153,.12); color: var(--ok);
    border: 1.5px dashed rgba(77,213,153,.5);
    border-radius: 14px; padding: 14px; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  .bgm-add:active { transform: scale(.98); }

  /* ---- フッター（書き出し） ---- */
  .export-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
    background: rgba(23,18,58,.88);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(255,255,255,.08);
  }
  .export-bar-inner { width: 100%; max-width: 520px; }
  .export-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent) 0%, #6a4de0 100%);
    color: #fff; font-size: 16px; font-weight: 700; letter-spacing: .04em;
    cursor: pointer; transition: opacity .15s, transform .12s;
  }
  .export-btn:active { transform: scale(.98); }
  .export-btn[disabled] { opacity: .4; pointer-events: none; }
  .export-status { text-align: center; font-size: 12px; color: var(--text-dim); height: 16px; margin-top: 7px; }
  .export-status.ok { color: var(--ok); font-weight: 600; }
  .export-status.err { color: #ff8a9d; font-weight: 600; }

  dialog#confirmDlg {
    border: none; border-radius: 16px; padding: 22px 20px;
    background: var(--card); color: var(--text); max-width: 300px; width: 84vw;
  }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  #confirmDlg p { font-size: 14px; line-height: 1.6; margin-bottom: 18px; }
  .dlg-btns { display: flex; gap: 10px; }
  .dlg-btns button {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .dlg-cancel { background: rgba(255,255,255,.1); color: var(--text); }
  .dlg-del { background: var(--rec); color: #fff; }
</style>
</head>
<body>
<main>
  <header>
    <h1><span class="mic">🎙️</span>ポケット収録</h1>
    <div class="notice">⚠️ 収録中は画面を消さないでください</div>
  </header>

  <section class="recorder">
    <div class="timer" id="timer">00:00</div>
    <div class="rec-state" id="recState">タップして収録開始</div>
    <div class="rec-controls">
      <button class="side-btn" id="pauseBtn" disabled aria-label="一時停止">⏸</button>
      <button class="rec-btn" id="recBtn" aria-label="録音の開始 / 停止"></button>
      <div class="side-btn" style="visibility:hidden"></div>
    </div>
    <div class="rec-hint">停止するとチャンクとしてリストに追加されます</div>
  </section>

  <section class="chunks">
    <div class="chunks-head">
      <h2>チャンク（並べ替え：≡ をドラッグ）</h2>
      <span class="total-dur" id="totalDur"></span>
    </div>
    <ul id="chunkList"></ul>
    <div class="empty" id="emptyMsg">まだチャンクがありません。<br>録音するか、BGMを追加してください。</div>
    <label class="bgm-add">
      🎵 BGMを追加（音声ファイル）
      <input type="file" id="bgmInput" accept="audio/*,.mp3,.m4a,.wav,.aac,.ogg" multiple hidden>
    </label>
  </section>
</main>

<div class="export-bar">
  <div class="export-bar-inner">
    <button class="export-btn" id="exportBtn" disabled>📦 1本にまとめて書き出す</button>
    <div class="export-status" id="exportStatus"></div>
  </div>
</div>

<dialog id="confirmDlg">
  <p id="confirmMsg"></p>
  <div class="dlg-btns">
    <button class="dlg-cancel" id="dlgCancel">やめる</button>
    <button class="dlg-del" id="dlgOk">削除する</button>
  </div>
</dialog>

<script>
"use strict";
/* ============================================================
   ポケット収録 — Anchor復刻MVP
   収録(チャンク) / 並べ替え / BGM挿入 / WAV書き出し
   すべてブラウザ内で完結。サーバー・ログイン不要。
   ============================================================ */

const $ = (id) => document.getElementById(id);
const timerEl = $("timer"), recStateEl = $("recState");
const recBtn = $("recBtn"), pauseBtn = $("pauseBtn");
const listEl = $("chunkList"), emptyMsg = $("emptyMsg"), totalDurEl = $("totalDur");
const exportBtn = $("exportBtn"), exportStatus = $("exportStatus");

const state = {
  chunks: [],        // { id, type:'talk'|'bgm', name, blob, duration, url }
  talkCount: 0,
  recording: false,
  paused: false,
};

/* ---------- ユーティリティ ---------- */
function fmt(sec) {
  sec = Math.max(0, Math.round(sec));
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
  const mm = String(m).padStart(2, "0"), ss = String(s).padStart(2, "0");
  return h > 0 ? `${h}:${mm}:${ss}` : `${mm}:${ss}`;
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ---------- 収録 ---------- */
let mediaRecorder = null, mediaStream = null, recParts = [];
let elapsedBase = 0, segStart = 0, timerInterval = null;
let wakeLock = null;

function pickMime() {
  const cands = ["audio/mp4", "audio/webm;codecs=opus", "audio/webm", "audio/ogg;codecs=opus"];
  if (window.MediaRecorder && MediaRecorder.isTypeSupported) {
    for (const t of cands) if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return ""; // ブラウザ任せ
}

function currentElapsed() {
  return elapsedBase + (state.recording && !state.paused ? (performance.now() - segStart) / 1000 : 0);
}
function tickTimer() { timerEl.textContent = fmt(currentElapsed()); }

async function requestWakeLock() {
  try { wakeLock = await navigator.wakeLock?.request("screen"); } catch (_) { /* 非対応でもOK */ }
}
function releaseWakeLock() { try { wakeLock?.release(); } catch (_) {} wakeLock = null; }

async function startRecording() {
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true }
    });
  } catch (err) {
    recStateEl.textContent = "マイクを使用できません（許可を確認してください）";
    recStateEl.className = "rec-state";
    console.error("getUserMedia failed:", err);
    return;
  }
  mediaStream = stream;
  recParts = [];
  const mime = pickMime();
  try {
    mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
  } catch (err) {
    mediaRecorder = new MediaRecorder(stream);
  }
  mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recParts.push(e.data); };
  mediaRecorder.onstop = onRecorderStopped;
  mediaRecorder.start(1000); // 1秒毎にデータ確保（途中クラッシュ対策）

  state.recording = true;
  state.paused = false;
  elapsedBase = 0;
  segStart = performance.now();
  timerInterval = setInterval(tickTimer, 250);
  requestWakeLock();
  updateRecUI();
}

function stopRecording() {
  if (!mediaRecorder) return;
  if (state.paused) {
    // pause中のstopでも経過時間は確定済み
  } else {
    elapsedBase += (performance.now() - segStart) / 1000;
  }
  state.recording = false;
  state.paused = false;
  clearInterval(timerInterval);
  try { mediaRecorder.stop(); } catch (_) {}
  releaseWakeLock();
  updateRecUI();
  recStateEl.textContent = "チャンクを保存中…";
}

function onRecorderStopped() {
  const type = mediaRecorder?.mimeType || recParts[0]?.type || "audio/webm";
  const blob = new Blob(recParts, { type });
  mediaStream?.getTracks().forEach((t) => t.stop());
  mediaStream = null;
  mediaRecorder = null;

  const dur = elapsedBase;
  elapsedBase = 0;
  timerEl.textContent = "00:00";

  if (blob.size === 0 || dur < 0.3) {
    recStateEl.textContent = "録音が短すぎたため破棄しました";
    return;
  }
  state.talkCount++;
  addChunk({
    id: uid(),
    type: "talk",
    name: `トーク ${state.talkCount}`,
    blob,
    duration: dur,
    url: null,
  });
  recStateEl.textContent = "チャンクを追加しました ✓";
}

function pauseResume() {
  if (!state.recording || !mediaRecorder) return;
  if (!state.paused) {
    elapsedBase += (performance.now() - segStart) / 1000;
    try { mediaRecorder.pause(); } catch (_) {}
    state.paused = true;
  } else {
    segStart = performance.now();
    try { mediaRecorder.resume(); } catch (_) {}
    state.paused = false;
  }
  updateRecUI();
}

function updateRecUI() {
  if (state.recording) {
    recBtn.classList.add("recording");
    pauseBtn.disabled = false;
    if (state.paused) {
      pauseBtn.textContent = "▶";
      recStateEl.textContent = "一時停止中";
      recStateEl.className = "rec-state paused";
    } else {
      pauseBtn.textContent = "⏸";
      recStateEl.textContent = "録音中";
      recStateEl.className = "rec-state live";
    }
  } else {
    recBtn.classList.remove("recording");
    pauseBtn.disabled = true;
    pauseBtn.textContent = "⏸";
    recStateEl.className = "rec-state";
    if (!recStateEl.textContent || recStateEl.textContent === "録音中" || recStateEl.textContent === "一時停止中") {
      recStateEl.textContent = "タップして収録開始";
    }
  }
  tickTimer();
}

recBtn.addEventListener("click", () => {
  if (state.recording) stopRecording();
  else startRecording();
});
pauseBtn.addEventListener("click", pauseResume);

/* ---------- チャンク管理 ---------- */
function addChunk(chunk) {
  state.chunks.push(chunk);
  renderList();
}

function removeChunk(id) {
  const i = state.chunks.findIndex((c) => c.id === id);
  if (i === -1) return;
  const c = state.chunks[i];
  if (playingId === id) stopPlayback();
  if (c.url) URL.revokeObjectURL(c.url);
  state.chunks.splice(i, 1);
  renderList();
}

function chunkUrl(chunk) {
  if (!chunk.url) chunk.url = URL.createObjectURL(chunk.blob);
  return chunk.url;
}

function totalDuration() {
  return state.chunks.reduce((a, c) => a + (c.duration || 0), 0);
}

/* ---------- 試聴 ---------- */
const player = new Audio();
let playingId = null;
player.addEventListener("ended", () => { playingId = null; refreshPlayIcons(); });
player.addEventListener("pause", () => { refreshPlayIcons(); });

function togglePlay(chunk) {
  if (playingId === chunk.id && !player.paused) {
    player.pause();
    playingId = null;
  } else {
    player.src = chunkUrl(chunk);
    player.play().catch((e) => console.warn("play failed:", e));
    playingId = chunk.id;
  }
  refreshPlayIcons();
}
function stopPlayback() {
  player.pause();
  player.removeAttribute("src");
  playingId = null;
  refreshPlayIcons();
}
function refreshPlayIcons() {
  for (const li of listEl.children) {
    const id = li.dataset.id;
    const btn = li.querySelector(".play-btn");
    const isPlaying = id === playingId && !player.paused;
    if (btn) btn.textContent = isPlaying ? "⏸" : "▶";
    li.classList.toggle("playing", isPlaying);
  }
}

/* ---------- リスト描画 ---------- */
function renderList() {
  listEl.innerHTML = "";
  for (const chunk of state.chunks) {
    const li = document.createElement("li");
    li.className = "chunk";
    li.dataset.id = chunk.id;

    const handle = document.createElement("div");
    handle.className = "drag-handle";
    handle.textContent = "≡";
    handle.addEventListener("pointerdown", (e) => startDrag(e, li));

    const icon = document.createElement("div");
    icon.className = "chunk-icon " + chunk.type;
    icon.textContent = chunk.type === "talk" ? "🎙️" : "🎵";

    const info = document.createElement("div");
    info.className = "chunk-info";
    const nm = document.createElement("div");
    nm.className = "chunk-name";
    nm.textContent = chunk.name;
    const meta = document.createElement("div");
    meta.className = "chunk-meta";
    meta.textContent = (chunk.type === "talk" ? "トーク・" : "BGM・") + fmt(chunk.duration);
    info.append(nm, meta);

    const playBtn = document.createElement("button");
    playBtn.className = "chunk-btn play-btn";
    playBtn.textContent = "▶";
    playBtn.setAttribute("aria-label", "試聴");
    playBtn.addEventListener("click", () => togglePlay(chunk));

    const delBtn = document.createElement("button");
    delBtn.className = "chunk-btn del";
    delBtn.textContent = "🗑";
    delBtn.setAttribute("aria-label", "削除");
    delBtn.addEventListener("click", () => confirmDelete(chunk));

    li.append(handle, icon, info, playBtn, delBtn);
    listEl.appendChild(li);
  }
  emptyMsg.style.display = state.chunks.length ? "none" : "";
  totalDurEl.textContent = state.chunks.length ? `合計 ${fmt(totalDuration())}` : "";
  exportBtn.disabled = state.chunks.length === 0;
  refreshPlayIcons();
}

/* ---------- 削除確認 ---------- */
const dlg = $("confirmDlg"), confirmMsg = $("confirmMsg");
let pendingDeleteId = null;
function confirmDelete(chunk) {
  pendingDeleteId = chunk.id;
  confirmMsg.textContent = `「${chunk.name}」を削除しますか？`;
  dlg.showModal();
}
$("dlgCancel").addEventListener("click", () => { pendingDeleteId = null; dlg.close(); });
$("dlgOk").addEventListener("click", () => {
  if (pendingDeleteId) removeChunk(pendingDeleteId);
  pendingDeleteId = null;
  dlg.close();
});

/* ---------- ドラッグ並べ替え ---------- */
let dragLi = null;
function startDrag(e, li) {
  e.preventDefault();
  dragLi = li;
  li.classList.add("dragging");
  const handle = e.currentTarget;
  try { handle.setPointerCapture(e.pointerId); } catch (_) {}

  const onMove = (ev) => {
    if (!dragLi) return;
    const y = ev.clientY;
    const siblings = [...listEl.children].filter((el) => el !== dragLi);
    let placed = false;
    for (const sib of siblings) {
      const r = sib.getBoundingClientRect();
      if (y < r.top + r.height / 2) {
        listEl.insertBefore(dragLi, sib);
        placed = true;
        break;
      }
    }
    if (!placed) listEl.appendChild(dragLi);
  };
  const onUp = () => {
    handle.removeEventListener("pointermove", onMove);
    handle.removeEventListener("pointerup", onUp);
    handle.removeEventListener("pointercancel", onUp);
    if (dragLi) dragLi.classList.remove("dragging");
    dragLi = null;
    // DOMの順序を state に反映
    const order = [...listEl.children].map((el) => el.dataset.id);
    state.chunks.sort((a, b) => order.indexOf(a.id) - order.indexOf(b.id));
  };
  handle.addEventListener("pointermove", onMove);
  handle.addEventListener("pointerup", onUp);
  handle.addEventListener("pointercancel", onUp);
}

/* ---------- BGM追加 ---------- */
$("bgmInput").addEventListener("change", async (e) => {
  const files = [...e.target.files];
  e.target.value = "";
  for (const file of files) {
    let dur = 0;
    try { dur = await getBlobDuration(file); }
    catch (err) { console.warn("duration取得失敗:", err); }
    addChunk({
      id: uid(),
      type: "bgm",
      name: file.name.replace(/\.[^.]+$/, ""),
      blob: file,
      duration: dur,
      url: null,
    });
  }
});

function getBlobDuration(blob) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const a = new Audio();
    a.preload = "metadata";
    const done = (d) => { URL.revokeObjectURL(url); resolve(d); };
    a.onloadedmetadata = () => {
      if (isFinite(a.duration) && a.duration > 0) return done(a.duration);
      // Chrome の webm duration=Infinity バグ回避
      a.currentTime = 1e7;
      a.ontimeupdate = () => { a.ontimeupdate = null; done(a.duration); a.currentTime = 0; };
    };
    a.onerror = () => { URL.revokeObjectURL(url); reject(new Error("audio load error")); };
    a.src = url;
  });
}

/* ---------- 書き出し（結合 → WAV） ---------- */
exportBtn.addEventListener("click", exportAll);

async function exportAll() {
  if (state.chunks.length === 0) return;
  stopPlayback();
  exportBtn.disabled = true;
  setStatus("音声を解析中…");

  const AC = window.AudioContext || window.webkitAudioContext;
  const ctx = new AC();
  try {
    // 1) 全チャンクをデコード
    const buffers = [];
    for (let i = 0; i < state.chunks.length; i++) {
      setStatus(`音声を解析中… (${i + 1}/${state.chunks.length})`);
      const ab = await state.chunks[i].blob.arrayBuffer();
      const buf = await decodeAudio(ctx, ab);
      buffers.push(buf);
    }

    // 2) 直列に連結してレンダリング
    setStatus("結合中…");
    const rate = ctx.sampleRate;
    const channels = Math.min(2, Math.max(...buffers.map((b) => b.numberOfChannels)));
    const totalFrames = buffers.reduce((a, b) => a + Math.ceil(b.duration * rate), 0);
    if (totalFrames === 0) throw new Error("音声が空です");

    const off = new OfflineAudioContext(channels, totalFrames, rate);
    let t = 0;
    for (const buf of buffers) {
      const src = off.createBufferSource();
      src.buffer = buf;
      src.connect(off.destination);
      src.start(t);
      t += buf.duration;
    }
    const rendered = await off.startRendering();

    // 3) WAVエンコード → ダウンロード
    setStatus("WAVファイルを作成中…");
    const wavBlob = encodeWav(rendered);
    const d = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    const fname = `podcast_${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.wav`;
    downloadBlob(wavBlob, fname);
    setStatus(`✓ 書き出し完了：${fname}（${(wavBlob.size / 1024 / 1024).toFixed(1)} MB）`, "ok");
  } catch (err) {
    console.error("export failed:", err);
    setStatus("書き出しに失敗しました：" + (err && err.message ? err.message : err), "err");
  } finally {
    try { ctx.close(); } catch (_) {}
    exportBtn.disabled = state.chunks.length === 0;
  }
}

// Safari旧実装はコールバック形式のみのことがあるためラップ
function decodeAudio(ctx, arrayBuffer) {
  return new Promise((resolve, reject) => {
    const p = ctx.decodeAudioData(arrayBuffer, resolve, reject);
    if (p && typeof p.then === "function") p.then(resolve, reject);
  });
}

function encodeWav(audioBuffer) {
  const numCh = audioBuffer.numberOfChannels;
  const rate = audioBuffer.sampleRate;
  const frames = audioBuffer.length;
  const bytesPerSample = 2; // 16-bit PCM
  const blockAlign = numCh * bytesPerSample;
  const dataSize = frames * blockAlign;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, "RIFF");
  view.setUint32(4, 36 + dataSize, true);
  writeStr(8, "WAVE");
  writeStr(12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);            // PCM
  view.setUint16(22, numCh, true);
  view.setUint32(24, rate, true);
  view.setUint32(28, rate * blockAlign, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, 16, true);
  writeStr(36, "data");
  view.setUint32(40, dataSize, true);

  // チャンネルをインターリーブしつつ16bit化
  const chData = [];
  for (let c = 0; c < numCh; c++) chData.push(audioBuffer.getChannelData(c));
  let off = 44;
  for (let i = 0; i < frames; i++) {
    for (let c = 0; c < numCh; c++) {
      let v = chData[c][i];
      v = Math.max(-1, Math.min(1, v));
      view.setInt16(off, v < 0 ? v * 0x8000 : v * 0x7fff, true);
      off += 2;
    }
  }
  return new Blob([buffer], { type: "audio/wav" });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 30_000);
}

function setStatus(msg, cls) {
  exportStatus.textContent = msg;
  exportStatus.className = "export-status" + (cls ? " " + cls : "");
}

/* ---------- 離脱防止 ---------- */
window.addEventListener("beforeunload", (e) => {
  if (state.chunks.length > 0 || state.recording) {
    e.preventDefault();
    e.returnValue = "";
  }
});

/* ---------- 初期化・テスト用フック ---------- */
renderList();
window.__app = { state, addChunk, removeChunk, exportAll, encodeWav, fmt, renderList };
</script>
